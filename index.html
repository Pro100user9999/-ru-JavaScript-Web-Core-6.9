<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Second Project</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <!-- Блок шапки -->
    <header class="header">
        <div class="header__menu">
            <button class="header__button--type--burger">
                <img src="./IMG/burger.svg" alt="Открыть меню" class="header__icon">
            </button>
            <img src="./IMG/Group.svg" alt="Group">
            <img src="./IMG/repair.svg" alt="ic-repair">
            <img src="./IMG/checkstatus.svg" alt="ic-checkstatus">
            <div class="header__actions">
                <img src="./IMG/call.svg" alt="Позвонить" class="header__icon">
                <img src="./IMG/chat.svg" alt="Служба подджки" class="header__icon">
                <img src="./IMG/profile.svg" alt="Профиль" class="header__icon">
            </div>
        </div>
    </header>
    <main class="main-content">
        <!-- Блок заголовка и навигацуи -->
        <section class="services">
            <h1 class="header-tittle">Услуги и сервисы</h1>
            <nav class="header-navigator">
                <ul class="services__list">
                    <li class="services__item">
                        <button class="services__button services__button--active">
                            Ремонтируемые устройства
                        </button>
                    </li>
                    <li class="services__item">
                        <button class="services__button">
                            Дополнительные услуги
                        </button>
                    </li>
                    <li class="services__item">
                        <button class="services__button">
                            Цены на услуги
                        </button>
                    </li>
                    <li class="services__item">
                        <button class="services__button">
                            Адреса сервисных центров
                        </button>
                    </li>
                    <li class="services__item">
                        <button class="services__button">
                            Специальные цены
                        </button>
                    </li>
                    <li class="services__item">
                        <button class="services__button">
                            Отзывы
                        </button>
                    </li>
                </ul>
            </nav>
        </section>
        <!-- второй блок описание -->
        <section class="about">
            <div class="about__content">
                <div class="about__comtent-text">
                    <p class="about__text">Мы являемся авторизованным сервисным центром по ремонту техники Dell. Только
                        у нас вы можете
                        отремонтировать свой ноутбук Dell с официальной гарантией производителя.</p>
                    <button type="button" class="about__button"><img src="./IMG/icon.svg" alt="icondown">Читать
                        далее</button>
                </div>
                <div class="about__image">
                    <img src="./IMG/_MG_3223.png" alt="picture for text" class="about__image">
                </div>
            </div>
        </section>
    </main>
</body>

</html>
