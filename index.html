<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Second Project</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <header class="header">
        <div class="upperMenu_mob">
        <img src="./IMG/burger.svg" alt="ic-burger">
        <img src="./IMG/Group.svg" alt="Group">
        <img src="./IMG/repair.svg" alt="ic-repair">
        <img src="./IMG/checkstatus.svg" alt="ic-checkstatus">
        </div>
    </header>
    <h1>Услуги и сервисы</h1>
    <nav class="header-navigator">
        <div class="header-button">
            <button type="button" class="menu-scroll__firstbutton">
                <span>Ремонтируемые устройства</span>
            </button>
            <button type="button">
                <span>Дополнительные услуги</span>
            </button>
            <button type="button">
                <span>Цены на услуги</span>
            </button>
            <button type="button">
                <span>Адреса сервисных центров</span>
            </button>
            <button type="button">
                <span>Специальные цены</span>
            </button>
        </div>
    </nav>
    <main>
        <div class="containertext">
            <p class="text">Мы являемся авторизованным сервисным центром по ремонту техники Dell. Только у нас вы можете
                отремонтировать свой ноутбук Dell с официальной гарантией производителя.</p>
            <button type="button" class="containertext__button"><img src="./IMG/icon.svg" alt="icondown">Читать далее</button>
            <img src="./IMG/_MG_3223.png" alt="picture for text">
        </div>
    </main>
</body>

</html>
